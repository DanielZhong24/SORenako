services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sorenako
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    environment:
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - FRONTEND_ORIGIN=http://localhost:5173
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sorenako
    ports:
      - "4000:4000"
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db-data:
    driver: local
